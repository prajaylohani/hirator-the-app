services:
  flask:
    build: ./backend
    container_name: backend
    expose:
      - 5100
    networks:
      - app-proxy
    restart: unless-stopped

  nextjs:
    build: ./frontend
    container_name: frontend
    expose:
      - 3000
    networks:
      - app-proxy
    restart: unless-stopped

  nginx:
    build: ./proxy
    container_name: proxy
    ports:
      - 5100:80
    depends_on:
      - flask
      - nextjs
    networks:
      - app-proxy
    restart: unless-stopped

networks:
  app-proxy:
    driver: bridge
